<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Recipe Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h2>🍳 The Recipe Manager</h2>
        <div>
            <a href="main.html">Home</a>
            <a href="favourites.html">Favourites</a>
            <a href="add-recipe.html">Add Recipe</a>
        </div>
    </nav>

    <header>
        <h1>Find Recipes From Your Ingredients</h1>
    </header>

    <section class="input-section">
        <input type="text" id="ingredientInput" placeholder="Add ingredient ...">
        <button onclick="RecipeManager.addIngredient()">Add</button>
        <button onclick="RecipeManager.searchRecipes()">Search</button>
        <button onclick="RecipeManager.clearIngredients()" class="clear-btn">Clear All</button>
        <script>RecipeManager.searchRecipes();</script>
    </section>

    <div id="ingredientList"></div>

    <section id="recipesContainer"></section>

    <script src="script.js"></script>
</body>
</html>
