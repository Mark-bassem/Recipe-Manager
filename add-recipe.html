<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="Add Recipe | The Recipe Manager">Add Recipe | What's in the Fridge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav aria-label="Primary" data-i18n-aria-label="Primary">
        <h2 data-i18n="The Recipe Manager">What's in the Fridge</h2>
        <div class="nav-links">
            <a href="main.html" data-i18n="Home">Home</a>
            <a href="favourites.html" data-i18n="Favourites">Favourites</a>
            <a href="add-recipe.html" aria-current="page" data-i18n="Add Recipe">Add Recipe</a>
            <a href="profile.html" data-i18n="Profile">Profile</a>
            <button id="logoutBtn" class="toggle-btn" onclick="logout()" data-i18n="Logout">Logout</button>
            <button id="langToggle" class="toggle-btn" onclick="toggleLang()">EN</button>
            <button id="themeToggle" class="toggle-btn" onclick="toggleTheme()">🌙</button>
        </div>
    </nav>

    <main>
        <section class="form" aria-label="Add a new recipe form" data-i18n-aria-label="Add a new recipe form">
            <h1 data-i18n="Add New Recipe">Add New Recipe</h1>

            <label class="sr-only" for="newName" data-i18n="Recipe name">Recipe name</label>
            <input id="newName" placeholder="Recipe Name ..." data-i18n-placeholder="Recipe Name ..." autocomplete="off">

            <label class="sr-only" for="newIngredients" data-i18n="Ingredients">Ingredients</label>
            <input id="newIngredients" placeholder="Ingredients (Comma Separated) ..." data-i18n-placeholder="Ingredients (Comma Separated) ..." autocomplete="off">

            <label class="sr-only" for="newImage" data-i18n="Image URL">Image URL</label>
            <input id="newImage" placeholder="Image URL ..." data-i18n-placeholder="Image URL ..." autocomplete="off">

            <label class="sr-only" for="newCuisine" data-i18n="Restaurant">Restaurant</label>
            <select id="newCuisine" data-i18n-aria-label="Restaurant" aria-label="Restaurant">
                <option value="" selected data-i18n="Select restaurant ...">Select restaurant ...</option>
                <option value="egyptian" data-i18n="Egyptian Cuisine">Egyptian Cuisine</option>
                <option value="saudi" data-i18n="Saudi Cuisine">Saudi Cuisine</option>
                <option value="italian" data-i18n="Italian Cuisine">Italian Cuisine</option>
                <option value="spanish" data-i18n="Spanish Cuisine">Spanish Cuisine</option>
            </select>

            <label class="sr-only" for="newInstructions" data-i18n="Instructions">Instructions</label>
            <textarea id="newInstructions" rows="5" placeholder="Recipe Instructions ..." data-i18n-placeholder="Recipe Instructions ..."></textarea>

            <button type="button" onclick="RecipeManager.addRecipe()" data-i18n="Add">Add</button>
            <p id="formMessage" class="form-message" aria-live="polite"></p>
        </section>
    </main>

    <script src="js/translations.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
