<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="Sign Up | The Recipe Manager">Sign Up | What's in the Fridge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav aria-label="Primary" data-i18n-aria-label="Primary">
        <h2 data-i18n="The Recipe Manager">What's in the Fridge</h2>
        <div class="nav-links">
            <a href="login.html" data-i18n="Login">Login</a>
            <a href="signup.html" aria-current="page" data-i18n="Sign Up">Sign Up</a>
            <button id="langToggle" class="toggle-btn" onclick="toggleLang()">EN</button>
            <button id="themeToggle" class="toggle-btn" onclick="toggleTheme()">🌙</button>
        </div>
    </nav>

    <main class="auth-wrap">
        <section class="form auth-form" aria-label="Sign up form" data-i18n-aria-label="Sign up form">
            <h1 data-i18n="Create Account">Create Account</h1>

            <label for="signupName" data-i18n="Full Name">Full Name</label>
            <input id="signupName" type="text" placeholder="Full Name" data-i18n-placeholder="Full Name" autocomplete="name">

            <label for="signupEmail" data-i18n="Email">Email</label>
            <input id="signupEmail" type="email" placeholder="Email" data-i18n-placeholder="Email" autocomplete="email">

            <label for="signupHeight" data-i18n="Height (cm)">Height (cm)</label>
            <input id="signupHeight" type="number" min="80" max="250" step="0.1" placeholder="Height (cm)" data-i18n-placeholder="Height (cm)" autocomplete="off">

            <label for="signupWeight" data-i18n="Weight (kg)">Weight (kg)</label>
            <input id="signupWeight" type="number" min="20" max="300" step="0.1" placeholder="Weight (kg)" data-i18n-placeholder="Weight (kg)" autocomplete="off">

            <label for="signupPassword" data-i18n="Password">Password</label>
            <input id="signupPassword" type="password" placeholder="Password" data-i18n-placeholder="Password" autocomplete="new-password">

            <label for="signupConfirmPassword" data-i18n="Confirm Password">Confirm Password</label>
            <input id="signupConfirmPassword" type="password" placeholder="Confirm Password" data-i18n-placeholder="Confirm Password" autocomplete="new-password">

            <button type="button" onclick="signup()" data-i18n="Sign Up">Sign Up</button>
            <p id="authMessage" class="auth-message" aria-live="polite"></p>
            <p class="auth-switch">
                <span data-i18n="Already have an account?">Already have an account?</span>
                <a href="login.html" data-i18n="Sign in here">Sign in here</a>
            </p>
        </section>
    </main>

    <script src="js/translations.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
