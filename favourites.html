<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="Favourites | The Recipe Manager">Favourites | What's in the Fridge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav aria-label="Primary" data-i18n-aria-label="Primary">
        <h2 data-i18n="The Recipe Manager">What's in the Fridge</h2>
        <div class="nav-links">
            <a href="main.html" data-i18n="Home">Home</a>
            <a href="favourites.html" aria-current="page" data-i18n="Favourites">Favourites</a>
            <a href="add-recipe.html" data-i18n="Add Recipe">Add Recipe</a>
            <a href="profile.html" data-i18n="Profile">Profile</a>
            <button id="logoutBtn" class="toggle-btn" onclick="logout()" data-i18n="Logout">Logout</button>
            <button id="langToggle" class="toggle-btn" onclick="toggleLang()">EN</button>
            <button id="themeToggle" class="toggle-btn" onclick="toggleTheme()">🌙</button>
        </div>
    </nav>

    <main>
        <header class="page-header">
            <h1 data-i18n="Your Favorites">Your Favorites</h1>
        </header>

        <section id="favoritesContainer" aria-live="polite" aria-label="Favorite recipes" data-i18n-aria-label="Favorite recipes"></section>
    </main>

    <!-- Templates for dynamic content -->
    <template id="favorite-card-template">
        <div class="card">
            <img src="" alt="">
            <div class="card-body">
                <h3 class="recipe-name"></h3>
                <button type="button" class="view-btn" data-i18n="View">View</button>
            </div>
        </div>
    </template>

    <template id="no-favorites-template">
        <p class="no-results" data-i18n="No favorites yet.">No favorites yet.</p>
    </template>

    <script src="js/translations.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
