<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="Recipe Details | The Recipe Manager">Recipe Details | The Recipe Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav aria-label="Primary">
        <h2 data-i18n="The Recipe Manager">The Recipe Manager</h2>
        <div class="nav-links">
            <a href="main.html" data-i18n="Home">Home</a>
            <a href="favourites.html" data-i18n="Favourites">Favourites</a>
            <a href="add-recipe.html" data-i18n="Add Recipe">Add Recipe</a>
            <button id="logoutBtn" class="toggle-btn" onclick="logout()" data-i18n="Logout">Logout</button>
            <button id="langToggle" class="toggle-btn" onclick="toggleLang()">EN</button>
            <button id="themeToggle" class="toggle-btn" onclick="toggleTheme()">🌙</button>
        </div>
    </nav>

    <main>
        <section id="recipeDetails" aria-live="polite" aria-label="Recipe details"></section>
    </main>

    <!-- Templates for dynamic content -->
    <template id="recipe-details-template">
        <div class="card recipe-detail-card">
            <img src="" alt="">
            <div class="card-body">
                <h2 class="recipe-name"></h2>
                <h4 data-i18n="Ingredients:">Ingredients:</h4>
                <ul class="recipe-ingredients-list"></ul>
                <h4 data-i18n="Instructions:">Instructions:</h4>
                <p class="recipe-instructions"></p>
                <div class="actions">
                    <button type="button" class="favorite-btn" data-i18n="Add to favorites">Add to favorites</button>
                    <button type="button" class="share-btn" data-i18n="Share">Share</button>
                </div>
            </div>
        </div>
    </template>

    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
